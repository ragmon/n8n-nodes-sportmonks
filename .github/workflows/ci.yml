name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (type check)
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Verify dist output
        run: |
          test -f dist/nodes/SportMonks/SportMonks.node.js || (echo "SportMonks.node.js missing" && exit 1)
          test -f dist/credentials/SportMonksApi.credentials.js || (echo "Credentials JS missing" && exit 1)
          test -f dist/nodes/SportMonks/sportmonks.svg || (echo "SVG icon missing" && exit 1)
          echo "All dist files present."
